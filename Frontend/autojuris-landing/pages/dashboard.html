<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="sidebar">
  <div>
    <div class="logo">⚖ AutoJuris</div>
    <div class="menu">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="clientes.html">Clientes</a>
      <a href="financeiro.html">Financeiro</a>
      <a href="agenda.html">Agenda</a>
      <a href="previsoes.html">Previsões</a>
      <a href="contratos.html">Contratos</a>
      <a href="inteligencia.html">Inteligência</a>
      <a href="equipe.html">Gestão de Equipe</a>
      <a href="escritorio.html">Meu Escritório</a>
    </div>
  </div>
  <div class="logout">Sair</div>
</div>

<div class="content">
  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h3>Faturamento do mês</h3>
      <strong>R$ 0,00</strong>
    </div>
    <div class="card">
      <h3>A receber</h3>
      <strong>R$ 10.000,00</strong>
    </div>
    <div class="card">
  <h3>Total de Clientes</h3>
  <strong id="totalClientes">0</strong>
</div>
    <div class="card">
      <h3>Inadimplentes</h3>
      <strong>0</strong>
    </div>
    <div class="card">
      <h3>Tempo economizado</h3>
      <strong>8 min</strong>
    </div>
  </div>
</div>

<script src="../js/script.js"></script>
<script>
  function atualizarDashboard() {
    let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
    document.getElementById("totalClientes").textContent = clientes.length;
  }

  document.addEventListener("DOMContentLoaded", atualizarDashboard);
</script>
</body>
</html>
